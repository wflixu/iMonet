name: iMonet
options:
  bundleIdPrefix: cn.wflixu
  deploymentTarget:
    macOS: 15.0
  developmentLanguage: zh-Hans
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    PRODUCT_NAME: iMonet
    PRODUCT_BUNDLE_IDENTIFIER: cn.wflixu.Monet
    MARKETING_VERSION: "2.0.0"
    CURRENT_PROJECT_VERSION: "20260604001"
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_PREVIEWS: true
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    ENABLE_HARDENED_RUNTIME: true
    DEAD_CODE_STRIPPING: true
    INFOPLIST_KEY_CFBundleDisplayName: iMonet
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"

targets:
  iMonet:
    type: application
    platform: macOS
    deploymentTarget: 15.0
    sources:
      - Sources
      - path: Sources
        excludes:
          - .DS_Store
          - "**/.DS_Store"
    resources:
      - Sources/Assets.xcassets
      - Sources/Resources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleIconName: AppIcon
        ITSAppUsesNonExemptEncryption: false
        CFBundleDocumentTypes:
          - CFBundleTypeName: PNG Image
            CFBundleTypeRole: Viewer
            LSHandlerRank: Default
            LSItemContentTypes:
              - public.png
            CFBundleTypeExtensions:
              - png
          - CFBundleTypeName: JPEG Image
            CFBundleTypeRole: Viewer
            LSHandlerRank: Default
            LSItemContentTypes:
              - public.jpeg
              - public.jpg
            CFBundleTypeExtensions:
              - jpg
              - jpeg
          - CFBundleTypeName: WebP Image
            CFBundleTypeRole: Viewer
            LSHandlerRank: Default
            LSItemContentTypes:
              - org.webmproject.webp
            CFBundleTypeExtensions:
              - webp
          - CFBundleTypeName: GIF Image
            CFBundleTypeRole: Viewer
            LSHandlerRank: Default
            LSItemContentTypes:
              - com.compuserve.gif
            CFBundleTypeExtensions:
              - gif
    entitlements:
      path: Sources/iMonet.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.files.user-selected.read-write: true
    dependencies: []
    scheme:
      testTargets:
        - iMonetTests
      commandLineArguments:
        - -EnableTesting: false

  iMonetTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests/iMonetTests
    dependencies:
      - target: iMonet

schemes:
  iMonet:
    build:
      targets:
        iMonet: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - iMonetTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
