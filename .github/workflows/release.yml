name: Build, Sign, Notarize and Release

on:
  push:
    tags:
      - 'v*' # 仅在推送 v1.0.0 这样的标签时触发

permissions:
  contents: write # 允许创建 Release 和删除 tag

jobs:
  build-and-release:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: |
          # 自动检测已安装的 Xcode
          XCODE_PATH=$(ls -d /Applications/Xcode*.app | head -n 1)
          if [ -z "$XCODE_PATH" ]; then
            echo "Error: Xcode not found"
            exit 1
          fi
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          echo "Using Xcode: $XCODE_PATH"

      # 获取版本号（从 git tag）
      - name: Get Version
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      # 1. 导入签名证书
      - name: Import Code Signing Certificate
        env:
          CERTIFICATE_P12: ${{ secrets.MACOS_CERT_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: 'action_keychain'
        run: |
          # 创建临时 keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          # 导入证书
          echo "$CERTIFICATE_P12" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          # 设置 keychain 搜索路径（保留 login.keychain 以访问系统证书）
          security list-keychains -d user -s build.keychain login.keychain

      # 2. 构建 App (使用 xcodebuild，不需要 generate-xcodeproj)
      - name: Build App
        env:
          DEVELOPER_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -e

          # 使用 xcodebuild 构建（Swift Package 不需要 .xcodeproj）
          # CODE_SIGNING_ALLOWED=NO: 依赖项不签名，留给后续手动 codesign
          # ARCHS=arm64 ONLY_ACTIVE_ARCH=NO: 只构建 arm64 架构，减小体积
          xcodebuild -scheme Monet \
            -configuration Release \
            -derivedDataPath build \
            -destination "generic/platform=macOS" \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_ACTIVE_COMPILATION_CONDITIONS="" \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=NO \
            build

          # 查找 App 路径（兼容不同 Xcode 版本的输出结构）
          APP_PATH=$(find build -name "Monet.app" -type d -path "*/Products/Release/*" | head -n 1)

          if [ -z "$APP_PATH" ]; then
            echo "Error: App not found in build directory"
            exit 1
          fi

          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          echo "Built app at: $APP_PATH"

          # 验证架构
          echo "Validating architecture..."
          lipo -info "$APP_PATH/Contents/MacOS/Monet" || true

      # 3. 代码签名 (Signing) - 分层签名（不用 --deep）
      - name: Code Sign App
        run: |
          set -e

          # 获取证书名称
          CERT_NAME=$(security find-identity -v -s "Developer ID Application" | head -n 1 | awk -F'"' '{print $2}')

          if [ -z "$CERT_NAME" ]; then
            echo "Error: Developer ID Certificate not found"
            exit 1
          fi

          echo "Signing with: $CERT_NAME"

          # 创建最小化 Distribution entitlements 文件（移除高风险权限）
          cat > Monet_Distribution.entitlements << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
            <dict>
              <key>com.apple.security.files.user-selected.read-write</key>
              <true/>
              <key>com.apple.security.network.client</key>
              <true/>
            </dict>
          </plist>
          EOF

          # 分层签名顺序：Frameworks → Plugins → 主 App
          echo "Signing frameworks..."
          if [ -d "$APP_PATH/Contents/Frameworks" ]; then
            find "$APP_PATH/Contents/Frameworks" -type f -perm +111 -exec codesign --force --options runtime --sign "$CERT_NAME" {} \;
          fi

          echo "Signing plugins and extensions..."
          find "$APP_PATH/Contents" \( -name "*.framework" -o -name "*.appex" -o -name "*.xpc" \) -exec codesign --force --options runtime --sign "$CERT_NAME" {} \;

          echo "Signing main app..."
          codesign --force --options runtime \
            --entitlements "Monet_Distribution.entitlements" \
            --sign "$CERT_NAME" "$APP_PATH"

          # 验证签名和 Hardened Runtime
          echo "Verifying code signature..."
          codesign -dv --verbose=4 "$APP_PATH" 2>&1 | grep -E "Runtime Version|Team Identifier|Authority" || true

          # 验证签名
          codesign --verify --verbose "$APP_PATH"

      # 4. 打包为 ZIP (公证需要 ZIP 或 DMG)
      - name: Zip App for Notarization
        run: |
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" Monet.zip

      # 5. 公证 (Notarization) - 带失败处理
      - name: Notarize App
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
          PRIVATE_KEY: ${{ secrets.NOTARY_PRIVATE_KEY }}
        run: |
          set -e

          # 保存 p8 密钥文件
          echo "$PRIVATE_KEY" > AuthKey_${KEY_ID}.p8

          # 提交公证并等待结果（使用 JSON 输出便于调试）
          RESULT=$(xcrun notarytool submit Monet.zip \
            --key-id "$KEY_ID" \
            --issuer "$ISSUER_ID" \
            --key "AuthKey_${KEY_ID}.p8" \
            --team-id "$TEAM_ID" \
            --wait \
            --output-format json)

          echo "$RESULT" | jq .

          STATUS=$(echo "$RESULT" | jq -r '.status')

          if [ "$STATUS" != "Accepted" ]; then
            echo "Notarization failed with status: $STATUS"
            # 尝试获取详细日志
            SUBMISSION_ID=$(echo "$RESULT" | jq -r '.id')
            if [ "$SUBMISSION_ID" != "null" ]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --key-id "$KEY_ID" \
                --issuer "$ISSUER_ID" \
                --key "AuthKey_${KEY_ID}.p8" \
                --team-id "$TEAM_ID" || true
            fi
            exit 1
          fi

          echo "Notarization successful"

      # 6. 绑定公证票据 (Stapling) - 关键步骤，否则离线用户无法运行
      - name: Staple Notarization Ticket
        run: |
          set -e

          xcrun stapler staple "$APP_PATH"

          # 验证是否绑定成功（使用 verbose=4）
          spctl --assess --type execute --verbose=4 "$APP_PATH"

      # 7. 创建 DMG 文件（使用 create-dmg 工具）
      - name: Install create-dmg
        run: |
          brew install create-dmg

      - name: Create DMG
        run: |
          set -e

          VERSION=${{ steps.version.outputs.version }}
          DMG_NAME="Monet-v${VERSION}.dmg"

          # 复制 App 到临时目录（保持原名 Monet.app）
          cp -R "$APP_PATH" ./Monet.app

          # 使用 create-dmg 创建专业 DMG（带拖拽安装界面）
          create-dmg \
            --volname "Monet" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "Monet.app" 150 200 \
            --hide-extension "Monet.app" \
            --app-drop-link 450 200 \
            "$DMG_NAME" \
            "./Monet.app"

          # 对 DMG 进行签名（需要重新获取证书名称）
          CERT_NAME=$(security find-identity -v -s "Developer ID Application" | head -n 1 | awk -F'"' '{print $2}')
          if [ -n "$CERT_NAME" ]; then
            codesign --force --sign "$CERT_NAME" "$DMG_NAME"
          fi

          echo "Created DMG: $DMG_NAME"

      # 7b. DMG 公证 (Notarization)
      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
          PRIVATE_KEY: ${{ secrets.NOTARY_PRIVATE_KEY }}
        run: |
          set -e

          VERSION=${{ steps.version.outputs.version }}
          DMG_NAME="Monet-v${VERSION}.dmg"

          # 保存 p8 密钥文件
          echo "$PRIVATE_KEY" > AuthKey_${KEY_ID}.p8

          # 提交 DMG 公证并等待结果
          RESULT=$(xcrun notarytool submit "$DMG_NAME" \
            --key-id "$KEY_ID" \
            --issuer "$ISSUER_ID" \
            --key "AuthKey_${KEY_ID}.p8" \
            --team-id "$TEAM_ID" \
            --wait \
            --output-format json)

          echo "$RESULT" | jq .

          STATUS=$(echo "$RESULT" | jq -r '.status')

          if [ "$STATUS" != "Accepted" ]; then
            echo "DMG Notarization failed with status: $STATUS"
            # 尝试获取详细日志
            SUBMISSION_ID=$(echo "$RESULT" | jq -r '.id')
            if [ "$SUBMISSION_ID" != "null" ]; then
              xcrun notarytool log "$SUBMISSION_ID" \
                --key-id "$KEY_ID" \
                --issuer "$ISSUER_ID" \
                --key "AuthKey_${KEY_ID}.p8" \
                --team-id "$TEAM_ID" || true
            fi
            exit 1
          fi

          # 绑定公证票据到 DMG
          xcrun stapler staple "$DMG_NAME"
          echo "DMG notarization and staple successful"

      # 8. 重命名并打包已公证的 App 为 ZIP
      - name: Zip Signed App with Version
        run: |
          set -e

          VERSION=${{ steps.version.outputs.version }}
          ZIP_NAME="Monet-v${VERSION}.app.zip"

          # 复制 App 到临时目录（保持原名 Monet.app）
          cp -R "$APP_PATH" ./Monet.app

          # 打包为 ZIP
          ditto -c -k --sequesterRsrc --keepParent "./Monet.app" "$ZIP_NAME"

          echo "Created ZIP: $ZIP_NAME"

      # 9. 创建 Release 并上传
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Monet-v${{ steps.version.outputs.version }}.app.zip
            Monet-v${{ steps.version.outputs.version }}.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 10. 失败时清理 tag
      - name: Cleanup Tag on Failure
        if: failure()
        run: |
          TAG_NAME="${{ github.ref_name }}"
          echo "Build failed, deleting tag: $TAG_NAME"

          # 删除远程 tag
          git push origin --delete "$TAG_NAME" || true

          echo "Tag $TAG_NAME has been deleted"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
